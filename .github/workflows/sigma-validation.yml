name: Sigma Rule Validation

on:
  push:
    paths:
      - 'sigma-rules/*.yml'
      - 'tests/*.json'
      - '.github/workflows/*.yml'

  pull_request:
    paths:
      - 'sigma-rules/*.yml'
      - 'tests/*.json'
      - '.github/workflows/*.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Validation Tools
        run: |
          pip install sigma-cli yamllint

      - name: Display Sigma Version
        run: |
          sigma version

      - name: Validate YAML Formatting
        run: |
          yamllint sigma-rules/

      - name: List Test Telemetry
        run: |
          echo "Available test telemetry files:"
          ls tests/

      - name: Validate Sigma Rules
        run: |
          echo "Validating Sigma Rules..."
          ls sigma-rules/